name: Refresh Energa Token

on:
  schedule:
    # Co poniedziałek o 2:00 AM
    - cron: '0 2 * * 1'
  
  # Pozwala ręczne uruchomienie z GitHub UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
        - name: Install dependencies
        run: |
          npm cache clean --force
          npm install
      
      - name: Refresh Energa Token
        env:
          ENERGA_EMAIL: ${{ secrets.ENERGA_EMAIL }}
          ENERGA_PASSWORD: ${{ secrets.ENERGA_PASSWORD }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
        run: npm run refresh
      
      - name: Log result
        if: always()
        run: echo "Token refresh completed"
