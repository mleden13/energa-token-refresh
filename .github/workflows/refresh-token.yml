name: Refresh Energa Token

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Refresh Energa Token
        env:
          ENERGA_EMAIL: ${{ secrets.ENERGA_EMAIL }}
          ENERGA_PASSWORD: ${{ secrets.ENERGA_PASSWORD }}
          GOOGLE_SHEETS_WEBHOOK: ${{ secrets.GOOGLE_SHEETS_WEBHOOK }}
          TWO_CAPTCHA_API_KEY: ${{ secrets.TWO_CAPTCHA_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: npm run refresh
